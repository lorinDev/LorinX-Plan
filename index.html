<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LorinX Plan · 每周规划模板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;padding:16px;max-width:780px;margin:0 auto;line-height:1.7}
.loading{text-align:center;padding:60px 0;color:#8b949e;font-size:15px}
h1{font-size:1.7em;color:#f0f6fc;margin:22px 0 14px;border-bottom:2px solid #30363d;padding-bottom:10px}
h2{font-size:1.25em;color:#f0f6fc;margin:26px 0 10px;border-bottom:1px solid #21262d;padding-bottom:6px}
h3{font-size:1.08em;color:#d2a8ff;margin:18px 0 7px}
h4{font-size:1em;color:#8b949e;margin:14px 0 5px}
p{line-height:1.8;margin:6px 0}
ul,ol{padding-left:22px;margin:8px 0}
li{line-height:1.8;margin:3px 0}
li>p{margin:0;display:inline}
strong{color:#f0f6fc}
em{color:#d2a8ff}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
th{background:#21262d;padding:7px 10px;text-align:left;font-weight:600;color:#58a6ff;border:1px solid #30363d}
td{padding:7px 10px;border:1px solid #30363d;vertical-align:top}
tr:nth-child(even){background:rgba(48,54,61,.3)}
tr:hover{background:rgba(88,166,255,.06)}
blockquote{border-left:3px solid #d29922;padding:6px 14px;margin:10px 0;color:#8b949e;background:rgba(210,153,34,.05);border-radius:0 4px 4px 0}
code{background:#21262d;padding:2px 6px;border-radius:4px;font-size:0.92em;color:#d2a8ff}
pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:14px;overflow-x:auto;margin:10px 0;font-size:13px}
pre code{background:none;padding:0;color:#c9d1d9;font-size:inherit}
hr{border:none;border-top:1px solid #21262d;margin:24px 0}
img{max-width:100%;border-radius:4px}
input[type=checkbox]{accent-color:#238636;margin-right:6px;transform:scale(1.1)}
.footer{margin-top:40px;padding-top:16px;border-top:1px solid #21262d;font-size:12px;color:#484f58;text-align:center}
@media(max-width:768px){
  body{padding:12px;font-size:14px}
  h1{font-size:1.4em}
  h2{font-size:1.15em}
  td,th{padding:5px 7px;font-size:12px}
  pre{padding:10px;font-size:12px}
}
</style>
</head>
<body>
<div id="content" class="loading">⏳ 加载中...</div>
<div class="footer">📋 LorinX Plan · <span id="updated"></span> · <a href="https://github.com/lorinDev/LorinX-Plan">GitHub</a></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
marked.setOptions({breaks:true,gfm:true});
fetch('./每周规划模板.md').then(function(r){return r.text()}).then(function(t){
  document.getElementById('content').innerHTML=marked.parse(t);
  document.getElementById('updated').textContent='更新于 '+new Date().toLocaleDateString('zh-CN');
}).catch(function(e){
  document.getElementById('content').innerHTML='<p style=color:#f85149>加载失败: '+e.message+'</p>';
});
</script>
</body>
</html>
