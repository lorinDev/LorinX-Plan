<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LorinX Plan · 每周规划模板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;max-width:800px;margin:0 auto}
.loading{text-align:center;padding:60px 0;color:#8b949e}
h1{font-size:1.8em;color:#f0f6fc;margin:20px 0 12px;border-bottom:2px solid #30363d;padding-bottom:10px}
h2{font-size:1.3em;color:#f0f6fc;margin:28px 0 10px;border-bottom:1px solid #21262d;padding-bottom:6px}
h3{font-size:1.1em;color:#d2a8ff;margin:18px 0 6px}
p{line-height:1.8;margin:6px 0;font-size:14px}
ul,ol{padding-left:22px;margin:8px 0}
li{line-height:1.8;font-size:14px;margin:3px 0}
strong{color:#f0f6fc}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
th{background:#21262d;padding:6px 10px;text-align:left;font-weight:600;color:#58a6ff;border:1px solid #30363d}
td{padding:6px 10px;border:1px solid #30363d}
tr:nth-child(even){background:rgba(48,54,61,.3)}
blockquote{border-left:3px solid #d29922;padding:4px 14px;margin:10px 0;color:#8b949e;background:rgba(210,153,34,.05)}
code{background:#21262d;padding:2px 6px;border-radius:4px;font-size:13px;color:#d2a8ff}
pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:14px;overflow-x:auto;margin:10px 0;font-size:13px}
pre code{background:none;padding:0;color:#c9d1d9}
hr{border:none;border-top:1px solid #21262d;margin:24px 0}
a{color:#58a6ff}
.footer{margin-top:40px;padding-top:16px;border-top:1px solid #21262d;font-size:12px;color:#484f58;text-align:center}
@media(max-width:768px){
  body{padding:12px}
  h1{font-size:1.4em}
  td,th{padding:4px 6px;font-size:12px}
  p,li{font-size:13px}
}
</style>
</head>
<body>
<div id="content" class="loading">加载中...</div>
<div class="footer">LorinX Plan · 每周规划模板 · <span id="updated"></span></div>
<script>
function md2html(text){
  var lines=text.split('\n'),out=[],i=0;
  while(i<lines.length){
    var s=lines[i].trim();
    if(!s){i++;continue}
    if(/^\|/.test(s)){
      var rows=[];
      while(i<lines.length&&/^\|/.test(lines[i].trim())){
        rows.push(lines[i].trim());i++;
      }
      rows=rows.filter(function(r){return!/^[\|\s\-:]+$/.test(r)});
      if(rows.length){
        var h='<table>',isHead=true;
        for(var j=0;j<rows.length;j++){
          var cells=rows[j].split('|').filter(function(c){return c.trim()});
          var tag=isHead?'th':'td';
          h+='<tr>'+cells.map(function(c){return'<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>';
          isHead=false;
        }
        h+='</table>';out.push(h);
      }
      continue;
    }
    var hm=s.match(/^(#{1,6})\s+(.+)$/);
    if(hm){out.push('<h'+hm[1].length+'>'+hm[2]+'</h'+hm[1].length+'>');i++;continue}
    if(/^>/.test(s)){var qs=[];
      while(i<lines.length&&/^>/.test(lines[i].trim())){qs.push(lines[i].trim().replace(/^>\s*/,''));i++}
      out.push('<blockquote>'+qs.join(' ')+'</blockquote>');continue}
    if(/^\d+\./.test(s)){var lis=[];
      while(i<lines.length&&/^\d+\./.test(lines[i].trim())){lis.push('<li>'+lines[i].trim().replace(/^\d+\.\s*/,'')+'</li>');i++}
      out.push('<ol>'+lis.join('')+'</ol>');continue}
    if(/^[-*]\s/.test(s)){var uls=[];
      while(i<lines.length&&/^[-*]\s/.test(lines[i].trim())){uls.push('<li>'+lines[i].trim().replace(/^[-*]\s+/,'')+'</li>');i++}
      out.push('<ul>'+uls.join('')+'</ul>');continue}
    if(s==='---'){out.push('<hr>');i++;continue}
    if(s.startsWith('```')){i++;var cl=[];
      while(i<lines.length&&!lines[i].trim().startsWith('```')){cl.push(lines[i]);i++}
      i++;out.push('<pre><code>'+cl.join('\n')+'</code></pre>');continue}
    var pl=[s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')];i++;
    while(i<lines.length&&lines[i].trim()&&!/^(#{1,6}\s|[|>\-*\d`])/.test(lines[i].trim())){
      pl.push(lines[i].trim().replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'));i++}
    out.push('<p>'+pl.join(' ')+'</p>')
  }
  return out.join('\n');
}
fetch('./每周规划模板.md').then(function(r){return r.text()}).then(function(t){
  document.getElementById('content').innerHTML=md2html(t);
  document.getElementById('updated').textContent='更新于 '+new Date().toLocaleDateString('zh-CN');
}).catch(function(e){
  document.getElementById('content').innerHTML='<p style=color:#f85149>加载失败: '+e.message+'</p>';
});
</script>
</body>
</html>
